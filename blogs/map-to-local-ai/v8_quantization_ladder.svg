<svg width="100%" viewBox="0 0 680 430" role="img" style="" xmlns="http://www.w3.org/2000/svg"><title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Quantizing a 7B model: bit-depth versus size</title><desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Horizontal bars for a 7-billion-parameter model. 16-bit is about 14 gigabytes at reference quality. 8-bit about 7 gigabytes, usually indistinguishable. 6-bit about 5.3 gigabytes. 5-bit about 4.4 gigabytes, a common compromise. 4-bit about 3.5 gigabytes, the usual local choice. 3-bit about 2.6 gigabytes with noticeable loss. 2-bit about 1.8 gigabytes, a last resort. Bars shrink as bit-depth drops.</desc>
